name: 'Setup ORT Server CLI'
description: 'Setup the ORT Server CLI (OSC) to use in GitHub workflows.'
inputs:
  osc-version:
    description: 'The version of the ORT Server CLI to install. Defaults to latest if not specified.'
    required: false
    default: latest
  url:
    description: 'The base URL of the ORT Server instance'
    required: true
  username:
    description: 'The username to authenticate with the ORT Server instance'
    required: true
  password:
    description: 'The password to authenticate with the ORT Server instance'
    required: true
  token-url:
    description: 'The URL to request a token for the ORT Server instance'
    required: false
  client-id:
    description: 'The client ID to authenticate with the ORT Server instance'
    required: false
outputs:
  osc-cached:
    description: 'A boolean flag to indicate whether the OSC tool was already cached'
    value: ${{ steps.download-osc.outputs.osc-cached }}
  server-version:
    description: 'The version of the ORT Server instance, if osc-version was set to server'
    value: ${{ steps.get-server-version.outputs.server-version }}

# language=bash
runs:
  using: composite
  steps:
    - name: Get Server Version
      if: ${{ inputs.osc-version == 'server' }}
      id: get-server-version
      shell: bash
      env:
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        # For security reasons, the /versions endpoint requires authentication [1].
        # Use curl with the provided credentials to authenticate and fetch the server version.
        # [1]: https://github.com/eclipse-apoapsis/actions/issues/33#issuecomment-3933821972
        if [[ -z "$USERNAME" || -z "$PASSWORD" || -z "${{ inputs.url }}" ]]; then
          echo "::error::osc-version=server requires username, password, and url to be configured."
          exit 1
        fi

        # Fetch OIDC configuration from server.
        echo "::notice::Fetching OIDC configuration from server..."
        OIDC_RESPONSE=$(curl -s "${{ inputs.url }}/api/v1/auth/oidc-config/cli")

        # Extract access token URL and client ID from response.
        SERVER_TOKEN_URL=$(echo "$OIDC_RESPONSE" | grep -o '"accessTokenUrl":"[^"]*"' | sed 's/"accessTokenUrl":"//' | sed 's/"//')
        SERVER_CLIENT_ID=$(echo "$OIDC_RESPONSE" | grep -o '"clientId":"[^"]*"' | sed 's/"clientId":"//' | sed 's/"//')

        # Allow user inputs to override server config.
        TOKEN_URL="${{ inputs.token-url }}"
        if [[ -z "$TOKEN_URL" ]]; then
          TOKEN_URL="$SERVER_TOKEN_URL"
        fi

        CLIENT_ID="${{ inputs.client-id }}"
        if [[ -z "$CLIENT_ID" ]]; then
          CLIENT_ID="$SERVER_CLIENT_ID"
        fi

        if [[ -z "$TOKEN_URL" ]]; then
          echo "::error::Failed to get access token URL from server OIDC config and no token-url input provided."
          exit 1
        fi

        if [[ -z "$CLIENT_ID" ]]; then
          echo "::error::Failed to get client ID from server OIDC config and no client-id input provided."
          exit 1
        fi

        echo "::notice::Using token URL: $TOKEN_URL"
        echo "::notice::Using client ID: $CLIENT_ID"

        # Authenticate with Keycloak.
        echo "::notice::Authenticating with Keycloak..."
        TOKEN_RESPONSE=$(curl -s -X POST "$TOKEN_URL" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=password" \
          -d "username=$USERNAME" \
          -d "password=$PASSWORD" \
          -d "client_id=$CLIENT_ID")

        # Extract access token.
        ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"access_token":"[^"]*"' | sed 's/"access_token":"//' | sed 's/"//')

        if [[ -z "$ACCESS_TOKEN" ]]; then
          echo "::error::Failed to obtain access token."
          exit 1
        fi

        # Mask the token from logs.
        echo "::add-mask::$ACCESS_TOKEN"

        # Get ORT Server version.
        echo "::notice::Fetching ORT Server version..."
        VERSION_RESPONSE=$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
          "${{ inputs.url }}/api/v1/versions")

        SERVER_VERSION=$(echo "$VERSION_RESPONSE" | grep -o '"ORT Server":"[^"]*"' | sed 's/"ORT Server":"//' | sed 's/"//')

        if [[ -z "$SERVER_VERSION" ]]; then
          echo "::error::Failed to get ORT Server version from API. Response: $VERSION_RESPONSE"
          exit 1
        fi

        echo "::notice::ORT Server version: $SERVER_VERSION"
        echo "server-version=$SERVER_VERSION" >> "$GITHUB_OUTPUT"

    - name: Download OSC
      id: download-osc
      shell: bash
      run: |
        OSC_VERSION="${{ inputs.osc-version }}"

        if [[ "$OSC_VERSION" = "server" ]]; then
          SERVER_VERSION="${{ steps.get-server-version.outputs.server-version }}"
          if [[ -z "$SERVER_VERSION" ]]; then
            echo "::error::Server version not set."
            exit 1
          fi
          OSC_VERSION="$SERVER_VERSION"
        elif [[ -z "$OSC_VERSION" || "$OSC_VERSION" = "latest" ]]; then
          OSC_VERSION=$(curl -sI https://github.com/eclipse-apoapsis/ort-server/releases/latest \
            | grep -i "location" | sed 's,.*/tag/,,' | tr -d '\r\n')

          if [ -z "$OSC_VERSION" ]; then
            echo "::error::Failed to get the latest OSC version."
            exit 1
          fi
        fi

        if [[ -z "$OSC_VERSION" || "$OSC_VERSION" = "null" ]]; then
          echo "::error::Failed to get the OSC version."
          exit 1
        fi

        OSC_HOME=$RUNNER_TOOL_CACHE/osc/$OSC_VERSION

        if [ ! -d "$OSC_HOME" ]; then
          LOWERCASE_OS=$(echo $RUNNER_OS | tr '[:upper:]' '[:lower:]')
          LOWERCASE_ARCH=$(echo $RUNNER_ARCH | tr '[:upper:]' '[:lower:]')

          echo "::notice::Setting up OSC version $OSC_VERSION ($LOWERCASE_OS-$LOWERCASE_ARCH) in '$OSC_HOME'..."

          mkdir -p "$OSC_HOME"

          if [ "$LOWERCASE_OS" = "windows" ]; then
            ASSET_NAME="osc-cli-$LOWERCASE_OS-$LOWERCASE_ARCH.zip"
          else
            ASSET_NAME="osc-cli-$LOWERCASE_OS-$LOWERCASE_ARCH.tar.gz"
          fi

          DOWNLOAD_URL="https://github.com/eclipse-apoapsis/ort-server/releases/download/$OSC_VERSION/$ASSET_NAME"

          curl -sL -o "$ASSET_NAME" "$DOWNLOAD_URL"

          if [ "$LOWERCASE_OS" = "windows" ]; then
            unzip "$ASSET_NAME" -d "$OSC_HOME"
          else
            tar -xzf "$ASSET_NAME" -C "$OSC_HOME"
          fi

          rm "$ASSET_NAME"

          echo "$OSC_HOME" >> "$GITHUB_PATH"
          echo "osc-cached=false" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::OSC version $OSC_VERSION is already set up in '$OSC_HOME'."

          echo "$OSC_HOME" >> "$GITHUB_PATH"
          echo "osc-cached=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure Authentication
      if: ${{ inputs.url != '' && inputs.username != '' && inputs.password != '' }}
      shell: bash
      env:
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        TOKEN_URL_ARG=""
        if [[ -n "${{ inputs.token-url }}" ]]; then
          TOKEN_URL_ARG="--token-url ${{ inputs.token-url }}"
        fi

        CLIENT_ID_ARG=""
        if [[ -n "${{ inputs.client-id }}" ]]; then
          CLIENT_ID_ARG="--client-id ${{ inputs.client-id }}"
        fi

        osc auth login \
          --url "${{ inputs.url }}" \
          --username "$USERNAME" \
          --password "$PASSWORD" \
          $TOKEN_URL_ARG \
          $CLIENT_ID_ARG

    - name: Authentication Info
      if: ${{ inputs.url == '' || inputs.username == '' || inputs.password == '' }}
      shell: bash
      run: |
        echo "::warning::OSC is running without authentication. Either configure authentication in the 'setup-osc' action (url, username and password), or authenticate manually using 'osc auth login'."
